services:
  mysql-db:
    image: mysql:5.6
    container_name: mysql-opensip
    environment:
      MYSQL_ROOT_PASSWORD: opensip
      MYSQL_DATABASE: opensips_db
    ports:
      - "3306:3306"
    volumes:
      - /home/tcc/projeto_tcc/mysql_files:/var/lib/mysql

  opensips:
    image: opensips/opensips:3.4
    container_name: opensips_server
    depends_on:
      - mysql-db
    ports:
      - "5060:5060/udp"
    volumes:
      - OpenSip_files:/etc/opensips/

volumes:
  OpenSip_files:
